AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Whispr backend Lambda functions
Globals:
  Function:
    Runtime: nodejs18.x
    Timeout: 10
    Environment:
      Variables:
        REGION: us-east-1
Resources:
  WhisprApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowOrigin: '''*'''
        AllowHeaders: '''Content-Type,Authorization'''
        AllowMethods: '''GET,POST,OPTIONS'''
  CreateUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: CreateUserFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName: whispr-users
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /users
            Method: POST
    Metadata:
      SamResourceId: CreateUserFunction
  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetUserFunction
      Handler: index.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName: whispr-users
      Events:
        GetUser:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /users/{userId}
            Method: GET
        OptionsUser:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /users/{userId}
            Method: OPTIONS
    Metadata:
      SamResourceId: GetUserFunction
  SaveConversationFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SaveConversationFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName: whispr-conversations
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /conversations
            Method: POST
    Metadata:
      SamResourceId: SaveConversationFunction
  SaveFeedbackFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: SaveFeedbackFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName: whispr-feedback
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /feedback
            Method: POST
    Metadata:
      SamResourceId: SaveFeedbackFunction
  GetProgressFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetProgressFunction
      Handler: index.handler
      Policies:
      - DynamoDBReadPolicy:
          TableName: whispr-progress
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /progress/{userId}
            Method: GET
    Metadata:
      SamResourceId: GetProgressFunction
  AnalyzeCultureFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: AnalyzeCultureFunction
      Handler: index.handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName: whispr-conversations
      Events:
        Api:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /analyze
            Method: POST
    Metadata:
      SamResourceId: AnalyzeCultureFunction
  GetUploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetUploadUrlFunction
      Handler: index.handler
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: s3:PutObject
          Resource:
            Fn::Sub: arn:aws:s3:::whispr-audio-uploads/*
      Events:
        PostUploadUrl:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /upload-url
            Method: POST
        OptionsUploadUrl:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /upload-url
            Method: OPTIONS
    Metadata:
      SamResourceId: GetUploadUrlFunction
  TranscribeAudioFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: TranscribeAudioFunction
      Handler: index.handler
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: transcribe:StartTranscriptionJob
          Resource: '*'
        - Effect: Allow
          Action: s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::whispr-audio-uploads/*
      Events:
        PostTranscribe:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /transcribe
            Method: POST
        OptionsTranscribe:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /transcribe
            Method: OPTIONS
    Metadata:
      SamResourceId: TranscribeAudioFunction
  GetTranscribeResultFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GetTranscribeResultFunction
      Handler: index.handler
      Policies:
      - Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action: transcribe:GetTranscriptionJob
          Resource: '*'
        - Effect: Allow
          Action: s3:GetObject
          Resource:
            Fn::Sub: arn:aws:s3:::whispr-audio-uploads/*
      Events:
        GetTranscribeResult:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /transcribe/result/{conversationId}
            Method: GET
        OptionsTranscribeResult:
          Type: Api
          Properties:
            RestApiId:
              Ref: WhisprApi
            Path: /transcribe/result/{conversationId}
            Method: OPTIONS
    Metadata:
      SamResourceId: GetTranscribeResultFunction
Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value:
      Fn::Sub: https://${WhisprApi}.execute-api.us-east-1.amazonaws.com/Prod
