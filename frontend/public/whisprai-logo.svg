<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Headphones with waveform and smiley face -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0277BD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB74D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF9800;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Left waveform dots -->
  <circle cx="60" cy="120" r="3" fill="#4FC3F7" opacity="0.6"/>
  <circle cx="70" cy="110" r="3" fill="#4FC3F7" opacity="0.7"/>
  <circle cx="80" cy="130" r="3" fill="#4FC3F7" opacity="0.5"/>
  <circle cx="90" cy="115" r="3" fill="#0277BD" opacity="0.8"/>
  
  <!-- Right waveform dots -->
  <circle cx="240" cy="120" r="3" fill="#FFB74D" opacity="0.6"/>
  <circle cx="230" cy="110" r="3" fill="#FFB74D" opacity="0.7"/>
  <circle cx="220" cy="130" r="3" fill="#FFB74D" opacity="0.5"/>
  <circle cx="210" cy="115" r="3" fill="#FF9800" opacity="0.8"/>
  
  <!-- Left headphone -->
  <path d="M 80 100 Q 80 60, 110 50" stroke="url(#blueGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <rect x="65" y="130" width="30" height="40" rx="8" fill="url(#blueGradient)"/>
  
  <!-- Right headphone -->
  <path d="M 220 100 Q 220 60, 190 50" stroke="url(#orangeGradient)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <rect x="205" y="130" width="30" height="40" rx="8" fill="url(#orangeGradient)"/>
  
  <!-- Face circle -->
  <circle cx="150" cy="120" r="50" fill="white" stroke="#0277BD" stroke-width="3"/>
  
  <!-- Smiley eyes -->
  <path d="M 130 110 Q 135 105, 140 110" stroke="#0277BD" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 160 110 Q 165 105, 170 110" stroke="#0277BD" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Smiley mouth -->
  <path d="M 130 135 Q 150 145, 170 135" stroke="#0277BD" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Waveform bars (left side) -->
  <rect x="100" y="115" width="3" height="10" fill="#4FC3F7" opacity="0.7"/>
  <rect x="105" y="110" width="3" height="20" fill="#4FC3F7" opacity="0.8"/>
  <rect x="110" y="105" width="3" height="30" fill="#0277BD" opacity="0.9"/>
  <rect x="115" y="112" width="3" height="16" fill="#0277BD" opacity="0.7"/>
  
  <!-- Waveform bars (right side) -->
  <rect x="182" y="112" width="3" height="16" fill="#FF9800" opacity="0.7"/>
  <rect x="187" y="105" width="3" height="30" fill="#FF9800" opacity="0.9"/>
  <rect x="192" y="110" width="3" height="20" fill="#FFB74D" opacity="0.8"/>
  <rect x="197" y="115" width="3" height="10" fill="#FFB74D" opacity="0.7"/>
  
  <!-- Text -->
  <text x="150" y="220" font-family="Arial, sans-serif" font-size="48" font-weight="bold" text-anchor="middle" fill="#0D47A1">Whispr<tspan fill="#4FC3F7">AI</tspan></text>
</svg>
